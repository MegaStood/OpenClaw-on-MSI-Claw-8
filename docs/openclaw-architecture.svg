<svg width="100%" viewBox="0 0 680 820" xmlns="http://www.w3.org/2000/svg">
<style>
  :root { --p: #1a1a1a; --s: #666; --t: #999; --bg2: #f5f5f5; --b: #ddd; }
  @media (prefers-color-scheme: dark) { :root { --p: #e5e5e5; --s: #aaa; --t: #777; --bg2: #2a2a2a; --b: #444; } }
  .th { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; font-weight: 500; fill: var(--p); }
  .ts { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; font-weight: 400; fill: var(--s); }
  .arr { stroke: var(--t); stroke-width: 1.5; }

  /* Color fills - light mode */
  .fill-green { fill: #E1F5EE; stroke: #0F6E56; }
  .fill-green .th { fill: #085041; } .fill-green .ts { fill: #0F6E56; }
  .fill-purple { fill: #EEEDFE; stroke: #534AB7; }
  .fill-purple .th { fill: #3C3489; } .fill-purple .ts { fill: #534AB7; }
  .fill-coral { fill: #FAECE7; stroke: #993C1D; }
  .fill-coral .th { fill: #712B13; } .fill-coral .ts { fill: #993C1D; }
  .fill-blue { fill: #E6F1FB; stroke: #185FA5; }
  .fill-blue .th { fill: #0C447C; } .fill-blue .ts { fill: #185FA5; }
  .fill-teal { fill: #E1F5EE; stroke: #0F6E56; }
  .fill-teal .th { fill: #085041; } .fill-teal .ts { fill: #0F6E56; }
  .fill-gray { fill: #F1EFE8; stroke: #5F5E5A; }
  .fill-gray .th { fill: #444441; } .fill-gray .ts { fill: #5F5E5A; }

  @media (prefers-color-scheme: dark) {
    .fill-green { fill: #04342C; stroke: #5DCAA5; }
    .fill-green .th { fill: #9FE1CB; } .fill-green .ts { fill: #5DCAA5; }
    .fill-purple { fill: #26215C; stroke: #AFA9EC; }
    .fill-purple .th { fill: #CECBF6; } .fill-purple .ts { fill: #AFA9EC; }
    .fill-coral { fill: #4A1B0C; stroke: #F0997B; }
    .fill-coral .th { fill: #F5C4B3; } .fill-coral .ts { fill: #F0997B; }
    .fill-blue { fill: #042C53; stroke: #85B7EB; }
    .fill-blue .th { fill: #B5D4F4; } .fill-blue .ts { fill: #85B7EB; }
    .fill-teal { fill: #04342C; stroke: #5DCAA5; }
    .fill-teal .th { fill: #9FE1CB; } .fill-teal .ts { fill: #5DCAA5; }
    .fill-gray { fill: #2C2C2A; stroke: #B4B2A9; }
    .fill-gray .th { fill: #D3D1C7; } .fill-gray .ts { fill: #B4B2A9; }
  }
</style>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<!-- Telegram/WhatsApp pill -->
<g class="fill-green">
<rect x="225" y="16" width="230" height="36" rx="18" stroke-width="0.5"/>
<text class="th" x="340" y="34" text-anchor="middle" dominant-baseline="central">Telegram / WhatsApp</text>
</g>

<!-- Arrow: Telegram → MSI Claw -->
<line x1="340" y1="52" x2="340" y2="84" class="arr" marker-end="url(#arrow)"/>

<!-- MSI Claw container -->
<g class="fill-green">
<rect x="30" y="84" width="620" height="310" rx="16" stroke-width="0.5"/>
<text class="th" x="340" y="108" text-anchor="middle" dominant-baseline="central">MSI Claw 8 AI+ (agent host)</text>
<text class="ts" x="340" y="124" text-anchor="middle" dominant-baseline="central">Always on, runs all agent logic</text>
</g>

<!-- OpenClaw box -->
<g class="fill-purple">
<rect x="200" y="140" width="280" height="40" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="160" text-anchor="middle" dominant-baseline="central">OpenClaw (orchestrator)</text>
</g>

<!-- Route labels -->
<text class="ts" x="125" y="198" text-anchor="middle" dominant-baseline="central">Hard tasks</text>
<text class="ts" x="340" y="198" text-anchor="middle" dominant-baseline="central">Routine tasks</text>
<text class="ts" x="555" y="198" text-anchor="middle" dominant-baseline="central">Fast / offline</text>

<!-- Arrows from OpenClaw to three routes -->
<line x1="265" y1="180" x2="125" y2="208" class="arr" marker-end="url(#arrow)"/>
<line x1="340" y1="180" x2="340" y2="208" class="arr" marker-end="url(#arrow)"/>
<line x1="415" y1="180" x2="555" y2="208" class="arr" marker-end="url(#arrow)"/>

<!-- Route box 1: Claude Agent SDK -->
<g class="fill-coral">
<rect x="38" y="210" width="174" height="88" rx="8" stroke-width="0.5"/>
<text class="th" x="125" y="232" text-anchor="middle" dominant-baseline="central">Claude Agent SDK</text>
<text class="ts" x="125" y="250" text-anchor="middle" dominant-baseline="central">Claude Code subprocess</text>
<text class="ts" x="125" y="266" text-anchor="middle" dominant-baseline="central">Max plan (Sonnet 4.6)</text>
<text class="ts" x="125" y="282" text-anchor="middle" dominant-baseline="central">Extended thinking</text>
</g>

<!-- Route box 2: Spark OpenAI HTTP -->
<g class="fill-blue">
<rect x="248" y="210" width="184" height="88" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="232" text-anchor="middle" dominant-baseline="central">OpenAI-compat HTTP</text>
<text class="ts" x="340" y="250" text-anchor="middle" dominant-baseline="central">POST /v1/chat/completions</text>
<text class="ts" x="340" y="266" text-anchor="middle" dominant-baseline="central">Qwen3.5-122B / 397B</text>
<text class="ts" x="340" y="282" text-anchor="middle" dominant-baseline="central">Free, unlimited, private</text>
</g>

<!-- Route box 3: Local llama.cpp -->
<g class="fill-teal">
<rect x="468" y="210" width="174" height="88" rx="8" stroke-width="0.5"/>
<text class="th" x="555" y="232" text-anchor="middle" dominant-baseline="central">Local llama.cpp</text>
<text class="ts" x="555" y="250" text-anchor="middle" dominant-baseline="central">http://127.0.0.1:8080</text>
<text class="ts" x="555" y="266" text-anchor="middle" dominant-baseline="central">LFM2-24B @ 20 t/s</text>
<text class="ts" x="555" y="282" text-anchor="middle" dominant-baseline="central">Vulkan GPU, offline</text>
</g>

<!-- Connection labels -->
<text class="ts" x="125" y="316" text-anchor="middle" dominant-baseline="central" opacity="0.5">HTTPS</text>
<text class="ts" x="340" y="316" text-anchor="middle" dominant-baseline="central" opacity="0.5">LAN / Tailscale</text>
<text class="ts" x="555" y="316" text-anchor="middle" dominant-baseline="central" opacity="0.5">localhost</text>

<!-- Dashed arrows down to external services -->
<line x1="125" y1="330" x2="125" y2="394" stroke="var(--t)" stroke-width="0.5" stroke-dasharray="4 3"/>
<line x1="125" y1="410" x2="125" y2="440" stroke="var(--t)" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<line x1="340" y1="330" x2="340" y2="394" stroke="var(--t)" stroke-width="0.5" stroke-dasharray="4 3"/>
<line x1="340" y1="410" x2="340" y2="440" stroke="var(--t)" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<!-- Local loop indicator -->
<path d="M555 330 L555 370" fill="none" stroke="var(--t)" stroke-width="0.5" stroke-dasharray="4 3"/>
<path d="M545 370 Q555 390 565 370" fill="none" stroke="var(--t)" stroke-width="0.5"/>
<text class="ts" x="555" y="356" text-anchor="middle" dominant-baseline="central" opacity="0.5">on-device</text>

<!-- External: Anthropic cloud -->
<g class="fill-coral">
<rect x="38" y="448" width="174" height="56" rx="12" stroke-width="0.5"/>
<text class="th" x="125" y="468" text-anchor="middle" dominant-baseline="central">Anthropic cloud</text>
<text class="ts" x="125" y="486" text-anchor="middle" dominant-baseline="central">Max plan weekly limits</text>
</g>

<!-- External: DGX Spark cluster -->
<g class="fill-blue">
<rect x="248" y="448" width="400" height="200" rx="12" stroke-width="0.5"/>
<text class="th" x="448" y="472" text-anchor="middle" dominant-baseline="central">DGX Spark cluster</text>
<text class="ts" x="448" y="488" text-anchor="middle" dominant-baseline="central">Inference only — stateless</text>
</g>

<!-- Inner: cdf1 node -->
<g class="fill-gray">
<rect x="274" y="508" width="150" height="60" rx="8" stroke-width="0.5"/>
<text class="th" x="349" y="528" text-anchor="middle" dominant-baseline="central">cdf1</text>
<text class="ts" x="349" y="548" text-anchor="middle" dominant-baseline="central">Head node · GB10</text>
</g>

<!-- RDMA label -->
<text class="ts" x="448" y="538" text-anchor="middle" dominant-baseline="central">RDMA</text>

<!-- Inner: 3d71 node -->
<g class="fill-gray">
<rect x="472" y="508" width="150" height="60" rx="8" stroke-width="0.5"/>
<text class="th" x="547" y="528" text-anchor="middle" dominant-baseline="central">3d71</text>
<text class="ts" x="547" y="548" text-anchor="middle" dominant-baseline="central">Worker · GB10</text>
</g>

<!-- vLLM bar -->
<g class="fill-blue">
<rect x="290" y="584" width="340" height="32" rx="6" stroke-width="0.5"/>
<text class="ts" x="460" y="600" text-anchor="middle" dominant-baseline="central">vLLM + Ray TP=2 on port 8888</text>
</g>

<!-- Routing logic legend -->
<text class="th" x="46" y="690" dominant-baseline="central">Routing logic</text>

<rect x="46" y="708" width="12" height="12" rx="2" fill="#F0997B" opacity="0.8"/>
<text class="ts" x="66" y="718" dominant-baseline="central">Complex bugs, architecture, refactoring → Claude Code (Max plan Sonnet)</text>

<rect x="46" y="732" width="12" height="12" rx="2" fill="#85B7EB" opacity="0.8"/>
<text class="ts" x="66" y="742" dominant-baseline="central">Tests, formatting, simple features → Spark vLLM (free Qwen3.5)</text>

<rect x="46" y="756" width="12" height="12" rx="2" fill="#5DCAA5" opacity="0.8"/>
<text class="ts" x="66" y="766" dominant-baseline="central">Fast dispatch, offline, simple tool calls → Local llama.cpp (LFM2 / Qwen3.5-35B)</text>

<rect x="46" y="780" width="12" height="12" rx="2" fill="#B4B2A9" opacity="0.8"/>
<text class="ts" x="66" y="790" dominant-baseline="central">Weekly quota exhausted → fall back from Claude to Spark automatically</text>

</svg>
